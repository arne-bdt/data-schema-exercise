# ---------------------------------------------------------------------------
# 2. What It Is & What It Covers
# ---------------------------------------------------------------------------
summary:
  description: |
    CIM/ENTSO-E refers to the ENTSO-E profile-based application of IEC CIM for
    cross-tool and cross-organization exchange of power-system models in Europe.
    In practice this is centered on CGMES and related ENTSO-E profile sets,
    published as machine-readable vocabulary schemas (RDFS) and validation
    constraints (SHACL). The schema solves the interoperability problem between
    TSOs, RCCs, and software vendors by defining a common semantic model and
    profile-specific exchange structure for grid model data used in system
    development and system operation.

  modeling_domains_supported: |
    Bulk transmission-grid modeling and exchange, including equipment,
    topology/connectivity, steady-state hypotheses, solved state variables,
    short-circuit and dynamic studies, diagram/geographical information, and
    related operational/system-development exchanges around common grid models.
    Via ENTSO-E network-code-related profiles, it also supports adjacent process
    data such as schedules and other regional coordination exchanges.

  what_does_it_NOT_cover: |
    It is not a market-optimization schema, not a simulation-results database
    design, and not a tool-internal runtime model. It does not prescribe solver
    algorithms, UI concepts, storage engines, or vendor-specific application
    behavior. It is also not primarily a low-voltage/distribution digital twin
    schema, although parts of CIM are broader than the ENTSO-E CGMES focus.

  data_captured: |
    Grid assets and their electrical parameters, connectivity/topology,
    terminals and containers, operational limits, state variables, steady-state
    input assumptions, model metadata, boundaries/reference data, geographical
    and diagram information, and selected process/time-dependent exchanges via
    ENTSO-E network-code profiles.

  conceptual_structure: |
    Profile-based, object-oriented semantic information model derived from IEC
    CIM UML and published as graph-shaped RDF vocabularies plus SHACL
    constraints. Exchange datasets are typically partitioned by profile (e.g.
    EQ, TP, SSH, SV, DY, DL, GL) and linked through persistent identifiers.

# ---------------------------------------------------------------------------
# 3. Key Design Decisions
# ---------------------------------------------------------------------------
design:
  key_decisions:
    - decision: Use IEC CIM as the base information model and define ENTSO-E-specific exchange profiles on top.
      rationale: Reuse of an international standard maximizes interoperability while allowing ENTSO-E-specific business requirements to be expressed in a controlled way.
    - decision: Split exchange content into profile-specific datasets (e.g. EQ, TP, SSH, SV, DL, GL, DY).
      rationale: Modular profile separation supports clearer exchange contracts, staged processing, and conformance testing for different business scenarios.
    - decision: Publish machine-readable schema and validation artifacts as RDFS and SHACL.
      rationale: This makes semantics and constraints explicit, tool-consumable, and easier to test across vendors.
    - decision: Rely on persistent mRID-based identity across model exchanges.
      rationale: Stable identifiers are essential for boundary matching, model merging, version comparison, and time-series/process continuity.
    - decision: Keep the artifacts tool-neutral and publicly versioned in an open repository.
      rationale: Transparency, reproducibility, and shared implementation guidance improve ecosystem convergence.

  schema_format: |
    IEC CIM / ENTSO-E application profiles defined from UML and published as
    machine-readable RDFS vocabularies and SHACL constraints; exchange instances
    are typically serialized as CIM/XML using RDF/XML-based conventions.

  implementation_languages:
    - Language-agnostic schema artifacts (RDFS/SHACL in RDF serializations)

  database_storage_backend: ~

  interoperability:
    imports_from:
      - ~

    exports_to:
      - https://pandapower.readthedocs.io/en/latest/converter/cgmes.html
      - https://powsybl.readthedocs.io/projects/powsybl-core/en/stable/grid_exchange_formats/cgmes/ 
      - https://github.com/SOPTIM/cgmes2pgm_converter 
      - https://veragrid.readthedocs.io/en/latest/md_source/data_models.html#cgmes
      - https://www.entsoe.eu/data/cim/cim-conformity-and-interoperability/#Conformity-Registry
      

  data_tool_relation: Data only

  extensibility: |
    Extensions are typically introduced through new or revised profiles,
    namespaces, and UML-to-profile generation rather than ad hoc custom fields.
    ENTSO-E also publishes related profile families beyond core CGMES (e.g. NCP),
    allowing controlled evolution while preserving interoperability.

  units_handling: |
    Units are primarily governed by CIM semantics and datatypes rather than by
    informal field naming. Implementations are expected to respect the units and
    meanings defined by the underlying CIM classes and profile definitions.

  validation_approach: |
    Validation includes profile conformance through SHACL constraints together
    with schema/vocabulary checks from the RDFS artifacts. In practice this
    covers structural consistency, typing, cardinality, allowed associations,
    and selected cross-object/profile consistency rules relevant to exchange.

  governance: |
    Governance is led by the ENTSO-E CIM Working Group. Releases are approved by
    ENTSO-E governance bodies/work groups and published in the ENTSO-E CGMES
    Library and the public Application Profiles Library repository. Feedback is
    handled through GitHub issues and the cim@entsoe.eu contact.

# ---------------------------------------------------------------------------
# 4. Real-World Usage
# ---------------------------------------------------------------------------
usage:
  tools_built_on_schema:
    - tool: CGMES-conformant power-system data management, planning, and operational analysis tools from multiple vendors
      relationship: Uses the schema as an exchange and interoperability format between organizations and applications
      link: https://www.entsoe.eu/data/cim/cim-conformity-and-interoperability/
    - tool: ENTSO-E and TSO/RCC common-grid-model exchange processes
      relationship: Uses the schema as the baseline model exchange layer for regional and pan-European exchanges
      link: https://www.entsoe.eu/digital/common-information-model/cim-for-grid-models-exchange/

  largest_real_world_dataset: |
    Pan-European and regional common-grid-model exchanges assembled from
    multiple individual grid models (IGMs) for transmission-system studies and
    operational coordination. Exact size depends on the process and scenario,
    but the intended scope is very large real-world transmission datasets across
    multiple TSOs rather than small academic test systems.

  who_is_using_it:
    - ENTSO-E and its CIM Working Group
    - European TSOs participating in common grid model exchanges
    - RCC-related regional coordination processes that depend on common grid models
    - Software suppliers implementing CGMES conformity for TSO-facing applications
    - At least in Germany DSOs also will have to provide their data as CGMES

  data_available:
    - geographic_area: Europe / ENTSO-E area
      content: |
        Transmission-grid model exchange data for system development and system
        operation use cases, including profile-based network models and related
        ENTSO-E documents/artifacts. Publicly available artifacts mainly include
        schemas, constraints, documentation, test/conformity material, and some
        process specifications rather than unrestricted operational model data.
      access: mixed_public_and_restricted

# ---------------------------------------------------------------------------
# 5. Limitations & Challenges
# ---------------------------------------------------------------------------
challenges:
  known_limitations:
    - Exchange semantics are rich, but implementation is non-trivial and requires careful profile handling across multiple datasets.
    - Interoperability depends not only on schema syntax but also on consistent interpretation of identifiers, boundaries, and profile semantics.
    - Real-world process requirements evolve faster than formal standardization, creating pressure for extensions, guidance, and clarifications.
    - The schema is intentionally exchange-oriented, so tool-internal optimization or solver-specific information may need separate representations.

  hardest_problems_encountered: |
    The hardest problem is not defining isolated classes, but achieving stable
    interoperability across organizations, processes, and software products.
    In practice that means aligning UML, profile derivation, serialization,
    identifiers, validation rules, and business-process expectations. A key
    lesson is that machine-readable constraints and open conformance processes
    are essential; narrative specifications alone are not enough.

    CIM/CGMES is based on semantic web standards like RDF, RDFS, SHACL and SPARQL.
    Knowledge about those has long been a barrier for many power system engineers
    and software vendors. However, the benefits of explicit semantics, 
    machine-checkable validation, and open tooling have proven to be worth the 
    initial learning curve.

# ---------------------------------------------------------------------------
# 6. Interoperability & Convergence
# ---------------------------------------------------------------------------
interoperability:
  areas_of_overlap_with_other_schemas: |
    There is strong overlap with other power-system data schemas wherever they
    represent network assets, topology, operational constraints, state
    variables, and time-dependent schedules. The main difference is that
    CIM/ENTSO-E is primarily an exchange and interoperability schema for
    multi-party enterprise/process integration, with explicit semantic profiles
    and conformance governance, rather than a schema designed around one
    simulation tool or one optimization workflow.

  what_would_convergence_require: |
    Convergence would require agreement on canonical identity management,
    topology semantics, equipment parameter semantics, profile boundaries, and a
    disciplined mapping between exchange-neutral concepts and tool-specific data
    models. Any common schema layer should preserve stable identifiers,
    profile-based modularity, explicit semantics, and machine-checkable
    validation.

  biggest_thing_others_should_know: |
    The most important point is that CIM/ENTSO-E is much more than a file
    format. Its value lies in shared semantics, profile contracts, persistent
    identity, and validation/conformity processes that make cross-vendor,
    cross-organization interoperability operationally feasible at scale.

